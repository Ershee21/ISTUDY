<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Study Guide</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <main class="login-wrap">
    <form id="loginForm" class="login-form" autocomplete="off">
      <h1>WELCOME!</h1>

      <input id="username" name="username" placeholder="USERNAME" required autocomplete="username">


      <input id="password" type="password" name="password" placeholder="PASSWORD" required autocomplete="current-password">

      <div class="login-actions">
        <button type="submit" id="loginBtn">LOGIN</button>

      </div>
      <div class="create-actions">
        <button type="submit" id="createBtn">CREATE ACCOUNT</button>

      </div>

      <p id="message" class="login-message" aria-live="polite"></p>
    </form>
    <p class="login-footer">Or <a href="study.html">Continue as guest</a></p>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
